<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên hệ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    .contact-form {
      background: #fff;
      max-width: 400px;
      margin: 40px auto;
      padding: 24px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .contact-form h2 {
      margin-bottom: 18px;
      font-size: 1.5em;
      color: #333;
      text-align: center;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #444;
      font-size: 1em;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1em;
      box-sizing: border-box;
    }
    .contact-form button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .contact-form button:hover {
      background: #0056b3;
    }
    @media (max-width: 500px) {
      .contact-form {
        max-width: 98%;
        padding: 16px 6px;
      }
      .contact-form h2 {
        font-size: 1.2em;
      }
    }
  </style>
</head>
<body>
  <form class="contact-form">
    <h2>Thông tin liên hệ</h2>
    <div class="form-group">
      <label for="fullname">Họ và tên</label>
      <input type="text" id="fullname" name="fullname" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="phone">Số điện thoại</label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10,11}" required>
    </div>
    <div class="form-group">
      <label for="zalo">Zalo</label>
      <input type="text" id="zalo" name="zalo">
    </div>
    <button type="submit">Gửi liên hệ</button>
  </form>
</body>
</html></div>
